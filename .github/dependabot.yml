# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # npm/bun dependencies (root)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Wait 2 days after publish before opening a PR — catches malware/yanks.
    # Pairs with bunfig.toml `minimumReleaseAge = 604800` (7d) for local installs.
    # Note: security-advisory PRs ignore this schedule and open immediately.
    cooldown:
      default-days: 2
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      development:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Major bumps stay ungrouped so each is reviewed individually.
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 2
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5
