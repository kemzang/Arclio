name: Deps vuln gate

# Runs `bun audit` against every Dependabot PR. Blocks merge if a bump pulls
# in (or fails to fix) a high+ advisory. Non-bot PRs skip this — humans run
# `bun run deps:vuln` locally pre-release instead.

on:
  pull_request:
    paths:
      # Only re-audit when the dep graph actually changes. Editing the gate
      # workflow or its script doesn't change vulnerabilities — would only
      # false-fire the gate on stale advisories unrelated to the PR.
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: read

jobs:
  audit:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run vulnerability gate (threshold=high)
        run: bun run deps:vuln
