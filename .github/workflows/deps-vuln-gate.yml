name: Deps vuln gate

# Runs `bun audit` against every dependency PR. Blocks merge if a bump pulls
# in (or fails to fix) a high+ advisory.

on:
  pull_request:
    paths:
      # Only re-audit when the dep graph actually changes. Editing the gate
      # workflow or its script doesn't change vulnerabilities — would only
      # false-fire the gate on stale advisories unrelated to the PR.
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: read

env:
  BUN_VERSION: '1.2.23'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Check dependency audit scope
        id: audit-scope
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: bun scripts/dependencyAuditScope.ts "${BASE_REF}"

      - name: Install dependencies
        if: steps.audit-scope.outputs.audit_required == 'true'
        run: bun install --frozen-lockfile

      - name: Run vulnerability gate (threshold=high)
        if: steps.audit-scope.outputs.audit_required == 'true'
        run: bun run deps:vuln
