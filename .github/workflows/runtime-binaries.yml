name: Runtime Binary Manifests

on:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  BUN_VERSION: '1.2.23'

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate manifest
        run: bun scripts/build/runtimeBinaryManifest.ts generate --out dist/runtime-binaries/runtime-index-v1.json --cache-root "$RUNNER_TEMP/arroxy-runtime-binary-manifest" --validate

      - name: Sign manifest
        env:
          ARROXY_RUNTIME_INDEX_SIGNING_KEY: ${{ secrets.ARROXY_RUNTIME_INDEX_SIGNING_KEY }}
        run: bun scripts/build/runtimeBinaryManifest.ts sign --manifest dist/runtime-binaries/runtime-index-v1.json --out dist/runtime-binaries/runtime-index-v1.sig

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtime-binary-manifest
          path: |
            dist/runtime-binaries/runtime-index-v1.json
            dist/runtime-binaries/runtime-index-v1.sig
          if-no-files-found: error

  validate:
    needs: generate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtime-binary-manifest
          path: dist/runtime-binaries

      - name: Materialize and smoke current host entries
        shell: bash
        run: bun scripts/build/runtimeBinaryManifest.ts validate --manifest dist/runtime-binaries/runtime-index-v1.json --cache-root "$RUNNER_TEMP/arroxy-runtime-binary-manifest" --smoke current

  publish:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      # Required to create/update the signed runtime manifest release assets.
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtime-binary-manifest
          path: dist/runtime-binaries

      - name: Publish signed manifest release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          tag="runtime-binaries"
          if ! gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$repo" --target "$GITHUB_SHA" --title "Runtime binary manifests" --notes "Mutable signed runtime binary manifest. The app verifies runtime-index-v1.sig before trusting runtime-index-v1.json."
          fi
          gh release upload "$tag" dist/runtime-binaries/runtime-index-v1.json dist/runtime-binaries/runtime-index-v1.sig --repo "$repo" --clobber
