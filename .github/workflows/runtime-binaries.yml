name: Runtime Binary Manifest Validation

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  BUN_VERSION: '1.2.23'

permissions:
  contents: read

jobs:
  validate-generator:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate and smoke current host manifest
        run: bun scripts/build/runtimeBinaryManifest.ts generate --out dist/runtime-binaries/runtime-index-v1.json --cache-root "$RUNNER_TEMP/arroxy-runtime-binary-manifest" --validate
