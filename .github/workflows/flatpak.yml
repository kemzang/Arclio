name: Flatpak Bundle

on:
  push:
    branches: [main]
    paths:
      - 'flatpak/**'
      - '.github/workflows/flatpak.yml'
  pull_request:
    paths:
      - 'flatpak/**'
      - '.github/workflows/flatpak.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # This workflow is for validation and ad-hoc Flatpak builds.
    # It renders the manifest from the latest published GitHub release tarball.
    # Tagged GitHub releases upload the Flatpak asset from release.yml.
    # Nothing here publishes to Flathub.
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          # render-flatpak-manifest.py reads v* tags to build the metainfo
          # <releases> block, matching the tagged release workflow.
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve latest release tarball
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import urllib.request

          repo = "antonio-orionus/Arroxy"
          token = os.environ.get("GITHUB_TOKEN")
          headers = {"Accept": "application/vnd.github+json"}
          if token:
              headers["Authorization"] = f"Bearer {token}"

          latest_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases/latest",
              headers=headers,
          )
          with urllib.request.urlopen(latest_req) as response:
              release = json.load(response)

          tag = release["tag_name"]
          version = tag[1:] if tag.startswith("v") else tag
          checksums_asset = next(
              (asset for asset in release["assets"] if asset["name"] == "SHA256SUMS"),
              None,
          )
          if checksums_asset is None:
              raise SystemExit("::error::Latest release does not include SHA256SUMS")

          checksum_req = urllib.request.Request(
              checksums_asset["browser_download_url"],
              headers=headers,
          )
          with urllib.request.urlopen(checksum_req) as response:
              checksums = response.read().decode("utf-8")

          target = f"Arroxy-{version}.tar.gz"
          hash_value = None
          for line in checksums.splitlines():
              if target in line:
                  hash_value = line.split()[0]
                  break
          if hash_value is None:
              raise SystemExit(f"::error::Could not find {target} in SHA256SUMS")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
              output.write(f"sha256={hash_value}\n")
          EOF
      - name: Download release tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          gh release download "v${VERSION}" \
            --repo antonio-orionus/Arroxy \
            --pattern "Arroxy-${VERSION}.tar.gz" \
            --dir flatpak
      - name: Render temporary manifest
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          VERSION="${{ steps.resolve.outputs.version }}"
          python3 scripts/render-flatpak-manifest.py \
            --sha256 "${{ steps.resolve.outputs.sha256 }}" \
            --archive-path "Arroxy-${VERSION}.tar.gz" \
            --template flatpak/io.github.antonio_orionus.Arroxy.yml.in \
            --output flatpak/io.github.antonio_orionus.Arroxy.yml \
            --metainfo-template flatpak/io.github.antonio_orionus.Arroxy.metainfo.xml.in \
            --metainfo-output flatpak/io.github.antonio_orionus.Arroxy.metainfo.xml
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        id: build
        with:
          bundle: arroxy.flatpak
          manifest-path: flatpak/io.github.antonio_orionus.Arroxy.yml
          cache-key: flatpak-builder-${{ github.sha }}
          verbose: true
