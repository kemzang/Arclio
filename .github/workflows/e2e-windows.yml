name: E2E Windows Cold Start

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  wizard-test:
    name: Packaged exe wizard smoke
    runs-on: windows-latest
    # build (~8 min including ffmpeg/ffprobe fetch) + playwright install + test
    # (~13 min for cold yt-dlp + deno download) + buffer = ~30 min happy path;
    # 45 min covers slow CDN and congested runners.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows unpacked
        shell: bash
        env:
          OPENPANEL_CLIENT_ID: ${{ secrets.OPENPANEL_CLIENT_ID }}
          OPENPANEL_CLIENT_SECRET: ${{ secrets.OPENPANEL_CLIENT_SECRET }}
        run: bun run dist:win:dir

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run cold-start E2E
        env:
          WIN_UNPACKED_EXE: ${{ github.workspace }}/dist/win-unpacked/Arroxy.exe
          # Point test mkdtemp to runner.temp so the upload-on-failure step
          # can find the userData dir at a known location.
          ARROXY_COLD_TMPDIR: ${{ runner.temp }}
        run: bunx playwright test tests/e2e/cold-start.spec.ts --config playwright.config.ts

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cold-start-failure-logs
          path: |
            ${{ runner.temp }}/arroxy-cold-*
          if-no-files-found: ignore
          retention-days: 3
