name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Knip
        run: bun run knip

      - name: Typecheck
        run: bun run typecheck

      - name: Circular imports
        run: bun run madge

      - name: Max LOC
        run: bun run check:loc

      - name: Dependency pins
        run: bun run check:pins

      - name: Test
        run: bun run test
