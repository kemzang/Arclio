name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Knip
        run: bun run knip

      - name: Typecheck
        run: bun run typecheck

      - name: Circular imports
        run: bun run madge

      - name: Test
        run: bun run test

  landing:
    name: Landing page is up to date
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install landing dependencies
        working-directory: landing
        run: bun install --frozen-lockfile

      - name: Regenerate landing + blog pages
        env:
          LANDING_OPENPANEL_CLIENT_ID: ${{ secrets.LANDING_OPENPANEL_CLIENT_ID }}
        run: bun run build:docs

      - name: Verify docs/ matches landing-src/
        run: |
          if ! git diff --quiet -- ':(exclude)docs/_astro' docs/; then
            echo "::warning::docs/ is out of sync with landing-src/. Run 'bun run build:docs' and commit the result when updating public content."
            git diff --stat -- ':(exclude)docs/_astro' docs/
          fi
