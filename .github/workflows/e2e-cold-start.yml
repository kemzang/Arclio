name: E2E Cold Start

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  BUN_VERSION: '1.2.23'

permissions:
  contents: read

jobs:
  cold-start:
    name: Cold start (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - os: windows-latest
            label: windows
            build_cmd: bun run dist:win:dir
          - os: macos-latest
            label: macos-arm64
            build_cmd: bun run dist:mac:arm64:dir
          - os: ubuntu-latest
            label: linux
            build_cmd: bun run dist:linux:dir

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ matrix.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ matrix.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build unpacked app
        shell: bash
        env:
          BUILD_CMD: ${{ matrix.build_cmd }}
          OPENPANEL_CLIENT_ID: ${{ secrets.OPENPANEL_CLIENT_ID }}
          OPENPANEL_CLIENT_SECRET: ${{ secrets.OPENPANEL_CLIENT_SECRET }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          BTBN_GITHUB_TOKEN: ${{ github.token }}
        run: bash -c "$BUILD_CMD"

      - name: Locate packaged executable
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            exe=$(find dist -name "Arroxy" -path "*/MacOS/Arroxy" 2>/dev/null | head -1)
          elif [ "$RUNNER_OS" = "Windows" ]; then
            exe="dist/win-unpacked/Arroxy.exe"
          else
            exe="dist/linux-unpacked/arroxy"
          fi
          echo "PACKAGED_EXE=$GITHUB_WORKSPACE/$exe" >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Prepare Windows diagnostics
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $diag = Join-Path $env:RUNNER_TEMP 'arroxy-windows-diagnostics'
          New-Item -ItemType Directory -Force -Path $diag | Out-Null
          "ARROXY_WINDOWS_DIAG_DIR=$diag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $channels = @(
            'Microsoft-Windows-Windows Defender/Operational',
            'Microsoft-Windows-CodeIntegrity/Operational',
            'Microsoft-Windows-AppLocker/EXE and DLL',
            'Microsoft-Windows-AppLocker/MSI and Script',
            'Microsoft-Windows-SmartScreen/Debug'
          )

          foreach ($channel in $channels) {
            "Enabling $channel" | Tee-Object -FilePath (Join-Path $diag 'event-channel-setup.txt') -Append
            & wevtutil sl $channel /e:true 2>&1 | Tee-Object -FilePath (Join-Path $diag 'event-channel-setup.txt') -Append
          }

          exit 0

      - name: Run cold-start E2E
        shell: bash
        env:
          ARROXY_COLD_TMPDIR: ${{ runner.temp }}
          ARROXY_LOG_ARCHIVE: ${{ runner.temp }}/arroxy-cold-logs
          ARROXY_BINARY_DOWNLOAD_MAX_MS: '120000'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a bunx playwright test tests/e2e/cold-start.spec.ts --config playwright.config.ts
          else
            bunx playwright test tests/e2e/cold-start.spec.ts --config playwright.config.ts
          fi

      - name: Collect Windows diagnostics
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $diag = if ($env:ARROXY_WINDOWS_DIAG_DIR) { $env:ARROXY_WINDOWS_DIAG_DIR } else { Join-Path $env:RUNNER_TEMP 'arroxy-windows-diagnostics' }
          New-Item -ItemType Directory -Force -Path $diag | Out-Null

          Get-Date -Format o | Out-File -FilePath (Join-Path $diag 'collected-at.txt') -Encoding utf8
          Get-ComputerInfo | Format-List * | Out-File -FilePath (Join-Path $diag 'computer-info.txt') -Encoding utf8
          Get-CimInstance Win32_OperatingSystem | Format-List * | Out-File -FilePath (Join-Path $diag 'os-cim.txt') -Encoding utf8
          Get-CimInstance Win32_ComputerSystem | Format-List * | Out-File -FilePath (Join-Path $diag 'computer-system-cim.txt') -Encoding utf8
          Get-ChildItem Env: | Sort-Object Name | Format-Table -AutoSize | Out-File -FilePath (Join-Path $diag 'environment.txt') -Encoding utf8
          Get-Process | Sort-Object CPU -Descending | Select-Object -First 150 | Format-Table -AutoSize | Out-File -FilePath (Join-Path $diag 'top-processes.txt') -Encoding utf8
          Get-Service WinDefend, SecurityHealthService, AppIDSvc -ErrorAction SilentlyContinue | Format-List * | Out-File -FilePath (Join-Path $diag 'security-services.txt') -Encoding utf8
          Get-Command winget, powershell, pwsh, wevtutil -ErrorAction SilentlyContinue | Format-List * | Out-File -FilePath (Join-Path $diag 'commands.txt') -Encoding utf8

          Get-MpComputerStatus | Format-List * | Out-File -FilePath (Join-Path $diag 'defender-status.txt') -Encoding utf8
          Get-MpPreference | Format-List * | Out-File -FilePath (Join-Path $diag 'defender-preference.txt') -Encoding utf8
          Get-MpThreat | Format-List * | Out-File -FilePath (Join-Path $diag 'defender-threats.txt') -Encoding utf8
          Get-MpThreatDetection | Format-List * | Out-File -FilePath (Join-Path $diag 'defender-threat-detections.txt') -Encoding utf8

          Get-ChildItem $env:RUNNER_TEMP -Force -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName, Length, CreationTimeUtc, LastWriteTimeUtc, Attributes |
            Export-Csv -NoTypeInformation -Path (Join-Path $diag 'runner-temp-tree.csv')

          $channels = @(
            'Application',
            'System',
            'Microsoft-Windows-Windows Defender/Operational',
            'Microsoft-Windows-CodeIntegrity/Operational',
            'Microsoft-Windows-AppLocker/EXE and DLL',
            'Microsoft-Windows-AppLocker/MSI and Script',
            'Microsoft-Windows-SmartScreen/Debug'
          )

          foreach ($channel in $channels) {
            $safe = $channel -replace '[\\/:*?"<>| ]+', '-'
            & wevtutil qe $channel /f:text /c:300 /rd:true 2>&1 | Out-File -FilePath (Join-Path $diag "$safe.txt") -Encoding utf8
            & wevtutil epl $channel (Join-Path $diag "$safe.evtx") /ow:true 2>&1 | Out-File -FilePath (Join-Path $diag "$safe-export.txt") -Encoding utf8
          }

          exit 0

      - name: Upload warmup logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cold-start-logs-${{ matrix.label }}
          path: ${{ runner.temp }}/arroxy-cold-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Windows diagnostics
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: cold-start-windows-diagnostics
          path: ${{ runner.temp }}/arroxy-windows-diagnostics
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cold-start-playwright-${{ matrix.label }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
