name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  BUN_VERSION: '1.2.23'

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: Ensure tag matches package version and release branch
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"

          TAG_COMMIT=$(git rev-list -n 1 "$GITHUB_REF_NAME")
          if [[ "$TAG_VERSION" == *-* ]]; then
            RELEASE_KIND=prerelease
          else
            RELEASE_KIND=stable
          fi

          if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "::error::$RELEASE_KIND tag $GITHUB_REF_NAME must point to a commit reachable from origin/main."
            echo "::error::Tag commit: $TAG_COMMIT"
            exit 1
          fi

          echo "Releasing version $PACKAGE_VERSION"

  quality-gate:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

  prepare-release:
    # Pre-create a single draft release for this tag before any publisher runs.
    # Without this, the parallel mac/linux `build` matrix jobs each call
    # electron-publisher-github's getOrCreateRelease(), which lists releases
    # by tag and creates a draft when none is found. Both racers see no
    # release simultaneously and create one each, plus the Windows Installer
    # workflow creates a third — leaving Linux assets stranded in an orphan
    # draft and breaking `build-flatpak`'s `gh release download`.
    #
    # By pre-creating a draft here, electron-publisher reuses it (it returns
    # the existing draft on the next list-releases call) and Windows
    # Installer's `view || create` shortcut also reuses it.
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure single draft release exists for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --draft --title "$GITHUB_REF_NAME" --notes ""

  build:
    # Windows is built separately by the Windows Installer workflow
    # (.github/workflows/installer-smoke.yml) so it can be smoke-tested
    # before publish. mac/linux still build + publish here via dist:release.
    #
    # ffmpeg/ffprobe are embedded at build time via electron-builder's
    # beforeBuild hook (build/beforeBuild.cjs invokes
    # scripts/build/fetch-embedded.sh). yt-dlp remains runtime-fetched by
    # BinaryManager; Electron provides the Node runtime for yt-dlp JS challenges.
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            dist-cmd: dist:release:linux
          - os: macos-latest
            dist-cmd: dist:release:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run ${{ matrix.dist-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BTBN_GITHUB_TOKEN: ${{ github.token }}
          OPENPANEL_CLIENT_ID: ${{ secrets.OPENPANEL_CLIENT_ID }}
          OPENPANEL_CLIENT_SECRET: ${{ secrets.OPENPANEL_CLIENT_SECRET }}
      - name: Install Linux smoke dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Locate packaged smoke executable
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            arch="$(uname -m)"
            if [ "$arch" = "arm64" ]; then
              exe=$(find dist -name "Arroxy" -path "*/mac-arm64/*.app/Contents/MacOS/Arroxy" 2>/dev/null | head -1)
            else
              exe=$(find dist -name "Arroxy" -path "*/mac/*.app/Contents/MacOS/Arroxy" 2>/dev/null | head -1)
            fi
            if [ -z "${exe:-}" ]; then
              exe=$(find dist -name "Arroxy" -path "*/Contents/MacOS/Arroxy" 2>/dev/null | head -1)
            fi
          else
            exe=$(find dist -maxdepth 1 \( -name "Arroxy-linux-x64.AppImage" -o -name "Arroxy-linux-x86_64.AppImage" \) -print | head -1)
            if [ -n "${exe:-}" ]; then
              chmod +x "$exe"
            fi
          fi
          if [ -z "${exe:-}" ] || [ ! -e "$exe" ]; then
            echo "::error::Could not locate packaged smoke executable"
            find dist -maxdepth 4 -type f | sort
            exit 1
          fi
          echo "PACKAGED_EXE=$GITHUB_WORKSPACE/$exe" >> "$GITHUB_ENV"
      - name: Prepend fake JS runtimes and yt-dlp to PATH
        shell: bash
        run: |
          fake="$RUNNER_TEMP/arroxy fake tools Ω"
          mkdir -p "$fake"
          cat > "$fake/node" <<'EOF'
          #!/usr/bin/env sh
          echo "fake old node v10.0.0"
          EOF
          cat > "$fake/deno" <<'EOF'
          #!/usr/bin/env sh
          echo "fake deno 2.0.0"
          EOF
          cat > "$fake/yt-dlp" <<'EOF'
          #!/usr/bin/env sh
          echo "fake yt-dlp should not be used" >&2
          exit 1
          EOF
          chmod +x "$fake/node" "$fake/deno" "$fake/yt-dlp"
          echo "$fake" >> "$GITHUB_PATH"
      - name: Run packaged runtime smoke
        shell: bash
        env:
          ARROXY_RUNTIME_SMOKE: '1'
          ELECTRON_USER_DATA: ${{ runner.temp }}/Arroxy Runtime Ω Release
          ARROXY_LOG_ARCHIVE: ${{ runner.temp }}/runtime-smoke-logs
          ARROXY_BINARY_DOWNLOAD_MAX_MS: '120000'
        run: |
          mkdir -p "$ARROXY_LOG_ARCHIVE"
          unset ELECTRON_RUN_AS_NODE
          stdout="$ARROXY_LOG_ARCHIVE/runtime-smoke.out"
          stderr="$ARROXY_LOG_ARCHIVE/runtime-smoke.err"
          set +e
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a "$PACKAGED_EXE" >"$stdout" 2>"$stderr"
          else
            "$PACKAGED_EXE" >"$stdout" 2>"$stderr"
          fi
          status=$?
          set -e
          cat "$stdout"
          if [ -s "$stderr" ]; then
            cat "$stderr" >&2
          fi
          exit "$status"
      - name: Run Linux live YouTube canary
        if: runner.os == 'Linux'
        shell: bash
        env:
          ARROXY_SMOKE_URL: ${{ vars.ARROXY_LIVE_CANARY_URL }}
          ELECTRON_USER_DATA: ${{ runner.temp }}/Arroxy Live Canary Ω
          ARROXY_LOG_ARCHIVE: ${{ runner.temp }}/runtime-smoke-logs
          ARROXY_BINARY_DOWNLOAD_MAX_MS: '120000'
        run: |
          if [ -z "${ARROXY_SMOKE_URL:-}" ]; then
            echo "::error::ARROXY_LIVE_CANARY_URL repository variable is required for release canary."
            exit 1
          fi
          mkdir -p "$ARROXY_LOG_ARCHIVE"
          unset ELECTRON_RUN_AS_NODE
          stdout="$ARROXY_LOG_ARCHIVE/live-canary.out"
          stderr="$ARROXY_LOG_ARCHIVE/live-canary.err"
          set +e
          xvfb-run -a "$PACKAGED_EXE" >"$stdout" 2>"$stderr"
          status=$?
          set -e
          cat "$stdout"
          if [ -s "$stderr" ]; then
            cat "$stderr" >&2
          fi
          exit "$status"
      - name: Upload runtime smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtime-smoke-logs-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/runtime-smoke-logs
            ${{ runner.temp }}/Arroxy Runtime Ω Release/logs
            ${{ runner.temp }}/Arroxy Live Canary Ω/logs
          if-no-files-found: ignore
          retention-days: 7

  publish-release:
    needs: [build, upload-flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set release title and notes
        # Hand-written user-facing notes live in CHANGELOG.md, keyed by version
        # (e.g. `## 0.3.5-beta.1`). Extract that section, then append the
        # auto-generated "What's Changed" PR list + Full Changelog link from
        # the GitHub API so the bottom half stays automatic.
        # Falls back to pure auto-generated notes if no matching section is
        # found (defensive — broken release is worse than ugly release).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${REF_NAME#v}"
          AUTO_NOTES=$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="${REF_NAME}" --jq .body)
          # Stop only on next *version* heading (## followed by a digit), so
          # nested `## Highlights` subsections inside the entry are kept.
          MANUAL_NOTES=$(awk -v ver="## ${VERSION}" '
            $0 == ver { capture = 1; next }
            capture && /^## [0-9]/ { capture = 0 }
            capture { print }
          ' CHANGELOG.md)
          DOWNLOAD_BADGES=$(cat <<EOF
          ## Install

          [![Windows Setup](https://img.shields.io/badge/Windows-Setup-0078D4?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/${REPO}/releases/download/${REF_NAME}/Arroxy-win-x64-Setup.exe) [![Windows Portable](https://img.shields.io/badge/Windows-Portable-0078D4?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/${REPO}/releases/download/${REF_NAME}/Arroxy-win-x64-Portable.exe)<br>
          [![macOS Apple Silicon](https://img.shields.io/badge/macOS-Apple%20Silicon-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/${REPO}/releases/download/${REF_NAME}/Arroxy-mac-arm64.dmg) [![macOS Intel](https://img.shields.io/badge/macOS-Intel-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/${REPO}/releases/download/${REF_NAME}/Arroxy-mac-x64.dmg)<br>
          [![Linux AppImage](https://img.shields.io/badge/Linux-AppImage-FCC624?style=for-the-badge&logo=linux&logoColor=black)](https://github.com/${REPO}/releases/download/${REF_NAME}/Arroxy-linux-x64.AppImage) [![Linux Flatpak](https://img.shields.io/badge/Linux-Flatpak-4A90D9?style=for-the-badge&logo=flathub&logoColor=white)](https://github.com/${REPO}/releases/download/${REF_NAME}/Arroxy-linux-x64.flatpak) [![Linux tar.gz](https://img.shields.io/badge/Linux-tar.gz-6B7280?style=for-the-badge&logo=linux&logoColor=white)](https://github.com/${REPO}/releases/download/${REF_NAME}/Arroxy-linux-x64.tar.gz)<br>
          [![SHA256](https://img.shields.io/badge/SHA256-Checksums-4B5563?style=for-the-badge&logo=github&logoColor=white)](https://github.com/${REPO}/releases/download/${REF_NAME}/SHA256SUMS)
          EOF
          )
          if [ -n "$(echo "$MANUAL_NOTES" | tr -d '[:space:]')" ]; then
            NOTES="${DOWNLOAD_BADGES}"$'\n\n'"${MANUAL_NOTES}"$'\n\n---\n\n'"${AUTO_NOTES}"
          else
            echo "::warning::No CHANGELOG.md section found for ${VERSION}; using auto-generated notes only"
            NOTES="${DOWNLOAD_BADGES}"$'\n\n'"${AUTO_NOTES}"
          fi
          gh release edit "${REF_NAME}" \
            --title "${REF_NAME}" \
            --notes "$NOTES"
      - name: Wait for Windows artifacts
        # Windows artifacts come from the Windows Installer workflow, which
        # runs in parallel with this one. mac/linux usually finish first;
        # poll until Setup + Portable both land before generating SHA256SUMS,
        # so publish-scoop / publish-homebrew get the Windows hashes they
        # need.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 90); do
            assets=$(gh release view "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --json assets --jq '.assets[].name' 2>/dev/null || echo "")
            if echo "$assets" | grep -Fxq "Arroxy-win-x64-Setup.exe" \
              && echo "$assets" | grep -Fxq "Arroxy-win-x64-Portable.exe"; then
              echo "Windows artifacts present after ${i}0s"
              exit 0
            fi
            echo "Waiting for Windows artifacts (${i}/90)..."
            sleep 10
          done
          echo "::error::Timed out waiting for Windows artifacts after 15 min."
          echo "::error::Check the Windows Installer workflow run for this tag."
          exit 1
      - name: Normalize Linux AppImage asset name
        # electron-builder's AppImage target emits the Linux machine arch as
        # x86_64 even when the configured build arch is x64. Keep the public
        # release contract on x64 and rewrite latest-linux.yml to match.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          public_name="Arroxy-linux-x64.AppImage"
          builder_name="Arroxy-linux-x86_64.AppImage"
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT

          assets=$(gh release view "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets --jq '.assets[].name' 2>/dev/null || echo "")

          if echo "$assets" | grep -Fxq "$public_name"; then
            echo "${public_name} already present"
          elif echo "$assets" | grep -Fxq "$builder_name"; then
            gh release download "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "$builder_name" \
              --dir "$tmpdir"
            mv "$tmpdir/$builder_name" "$tmpdir/$public_name"
            gh release upload "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              "$tmpdir/$public_name" \
              --clobber
          else
            echo "::error::Missing Linux AppImage asset. Expected ${public_name} or ${builder_name}."
            echo "$assets"
            exit 1
          fi

          if gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern latest-linux.yml \
            --dir "$tmpdir"; then
            if grep -Fq "$builder_name" "$tmpdir/latest-linux.yml"; then
              perl -0pi -e "s/\Q$builder_name\E/$public_name/g" "$tmpdir/latest-linux.yml"
              gh release upload "${GITHUB_REF_NAME}" \
                --repo "${GITHUB_REPOSITORY}" \
                "$tmpdir/latest-linux.yml" \
                --clobber
            fi
          fi

          builder_api_url=$(gh release view "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq ".assets[] | select(.name == \"${builder_name}\") | .apiUrl" 2>/dev/null || true)
          if [ -n "$builder_api_url" ]; then
            gh api -X DELETE "${builder_api_url#https://api.github.com/}"
          fi
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail

          rm -rf artifacts
          mkdir artifacts

          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir artifacts \
            --pattern "Arroxy-win-x64-Setup.exe" \
            --pattern "Arroxy-win-x64-Portable.exe" \
            --pattern "Arroxy-mac-arm64.dmg" \
            --pattern "Arroxy-mac-x64.dmg" \
            --pattern "Arroxy-linux-x64.AppImage" \
            --pattern "Arroxy-linux-x64.tar.gz" \
            --pattern "Arroxy-linux-x64.flatpak"

          required=(
            "Arroxy-win-x64-Setup.exe"
            "Arroxy-win-x64-Portable.exe"
            "Arroxy-mac-arm64.dmg"
            "Arroxy-mac-x64.dmg"
            "Arroxy-linux-x64.AppImage"
            "Arroxy-linux-x64.tar.gz"
            "Arroxy-linux-x64.flatpak"
          )
          for file in "${required[@]}"; do
            if [ ! -f "artifacts/${file}" ]; then
              echo "::error::Missing required release asset for checksums: ${file}"
              find artifacts -maxdepth 1 -type f -printf '%f\n' | sort
              exit 1
            fi
          done

          (cd artifacts && sha256sum * > ../SHA256SUMS)
          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            SHA256SUMS \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release
        # Tags w/ a semver pre-release suffix (e.g. v0.4.0-beta.1) un-draft as
        # GitHub Pre-release. electron-updater's GitHub provider queries
        # /releases/latest, which excludes pre-releases — existing user installs
        # do NOT auto-update. Manual install from the release page works for
        # internal testing. Stable tags (e.g. v0.4.0) un-draft as full release
        # and trigger normal user auto-update.
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          EXTRA=""
          if [[ "$REF_NAME" == *-* ]]; then
            EXTRA="--prerelease"
          fi
          gh release edit "$REF_NAME" --draft=false $EXTRA

  build-flatpak:
    # Build a Flatpak bundle for the GitHub Release only.
    # This does not publish to Flathub or commit manifest changes back to main.
    #
    # Depends on `build` so Flatpak can be uploaded before `publish-release`
    # generates SHA256SUMS. The tar.gz hash is computed directly from the
    # artifact rather than read out of SHA256SUMS, keeping this job independent
    # from the final publish gate.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          # Need full tag history so render-flatpak-manifest.py can read tagger
          # dates of prior v* tags to render the metainfo <releases> block.
          fetch-depth: 0
          fetch-tags: true
      - name: Render manifest for this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The flatpak-builder container runs as a different user than the
          # workspace owner; without this, git refuses to read the repo with
          # "fatal: detected dubious ownership". actions/checkout sets this
          # too, but only into a temporary config that doesn't always survive
          # across steps in this container image.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          TARBALL="Arroxy-linux-x64.tar.gz"
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "$TARBALL" \
            --dir flatpak
          HASH=$(sha256sum "flatpak/$TARBALL" | awk '{print $1}')
          python3 scripts/render-flatpak-manifest.py \
            --sha256 "$HASH" \
            --archive-path "$TARBALL" \
            --template flatpak/io.github.antonio_orionus.Arroxy.yml.in \
            --output flatpak/io.github.antonio_orionus.Arroxy.yml \
            --metainfo-template flatpak/io.github.antonio_orionus.Arroxy.metainfo.xml.in \
            --metainfo-output flatpak/io.github.antonio_orionus.Arroxy.metainfo.xml
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: arroxy.flatpak
          manifest-path: flatpak/io.github.antonio_orionus.Arroxy.yml
          # Stable across release tags. Previously keyed on github.sha which
          # never hit, adding ~7 min per release. Invalidates only when flatpak
          # manifest or electron build inputs change.
          cache-key: flatpak-builder-${{ hashFiles('flatpak/**', 'electron-builder.json5', 'package.json') }}

  upload-flatpak:
    needs: build-flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: arroxy-x86_64.flatpak
          path: flatpak-artifact
      - name: Upload to release
        run: |
          FILE=$(find flatpak-artifact -name "*.flatpak" -print -quit)
          if [ -z "$FILE" ]; then
            echo "::error::Could not find built .flatpak artifact"
            find flatpak-artifact -maxdepth 3 -type f
            exit 1
          fi
          mv "$FILE" "Arroxy-linux-x64.flatpak"
          gh release upload "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            "Arroxy-linux-x64.flatpak" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-web-release-manifest:
    needs: publish-release
    # Only stable releases should update the public landing-page manifest.
    # Pre-releases are intentionally invisible to /releases/latest.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch arroxy-web manifest refresh
        env:
          GH_TOKEN: ${{ secrets.ARROXY_WEB_DISPATCH_TOKEN || secrets.WINGET_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh api repos/antonio-orionus/arroxy-web/dispatches \
            --method POST \
            -f event_type=arroxy-release \
            -f client_payload[tag]="$REF_NAME" \
            -f client_payload[source_repo]="$GITHUB_REPOSITORY"

  publish-scoop:
    needs: publish-release
    # Skip for pre-release tags (e.g. v0.4.0-beta.1) — only stable releases
    # bump the public Scoop bucket.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bucket
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: antonio-orionus/scoop-bucket
          token: ${{ secrets.WINGET_TOKEN }}
      - name: Download SHA256SUMS
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
      - name: Update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PORTABLE="Arroxy-win-x64-Portable.exe"
          HASH=$(grep "$PORTABLE" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH" ]; then
            echo "::error::Could not find $PORTABLE in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          jq --arg v "$VERSION" --arg h "$HASH" --arg p "$PORTABLE" \
            '.version = $v
             | .url = "https://github.com/antonio-orionus/Arroxy/releases/download/v\($v)/\($p)"
             | .hash = "sha256:\($h)"
             | .bin = $p
             | .shortcuts = [[$p, "Arroxy"]]' \
            bucket/arroxy.json > bucket/arroxy.json.tmp
          mv bucket/arroxy.json.tmp bucket/arroxy.json
      - name: Commit & push
        run: |
          git config user.name "arroxy-release-bot"
          git config user.email "release@arroxy.local"
          git add bucket/arroxy.json
          git commit -m "arroxy: bump to ${GITHUB_REF_NAME#v}"
          git push

  publish-homebrew:
    needs: publish-release
    # Skip for pre-release tags — only stable releases bump the Homebrew tap.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: antonio-orionus/homebrew-arroxy
          token: ${{ secrets.WINGET_TOKEN }}
      - name: Download SHA256SUMS
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
      - name: Update cask
        # We ship two arch-specific DMGs (arm64 + x64) instead of a universal
        # build, so the cask uses on_arm / on_intel stanzas. The whole file is
        # rewritten on each release because the structure has more moving
        # parts than a sed-replace can safely handle.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_ARM="Arroxy-mac-arm64.dmg"
          DMG_X64="Arroxy-mac-x64.dmg"
          HASH_ARM=$(grep "$DMG_ARM" SHA256SUMS | awk '{print $1}')
          HASH_X64=$(grep "$DMG_X64" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH_ARM" ] || [ -z "$HASH_X64" ]; then
            echo "::error::Could not find both arch DMGs in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          cat > Casks/arroxy.rb <<EOF
          cask "arroxy" do
            version "${VERSION}"

            on_arm do
              sha256 "${HASH_ARM}"
              url "https://github.com/antonio-orionus/Arroxy/releases/download/v#{version}/Arroxy-mac-arm64.dmg"
            end
            on_intel do
              sha256 "${HASH_X64}"
              url "https://github.com/antonio-orionus/Arroxy/releases/download/v#{version}/Arroxy-mac-x64.dmg"
            end

            name "Arroxy"
            desc "YouTube downloader"
            homepage "https://github.com/antonio-orionus/Arroxy"

            app "Arroxy.app"

            zap trash: [
              "~/Library/Application Support/Arroxy",
              "~/Library/Preferences/com.arroxy.app.plist",
              "~/Library/Logs/Arroxy",
            ]
          end
          EOF
      - name: Commit & push
        run: |
          git config user.name "arroxy-release-bot"
          git config user.email "release@arroxy.local"
          git add Casks/arroxy.rb
          git commit -m "arroxy: bump to ${GITHUB_REF_NAME#v}"
          git push
