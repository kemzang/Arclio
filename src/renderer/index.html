<!doctype html>
<html lang="en" class="dark" data-app-mode="%MODE%">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://tally.so; frame-src https://tally.so; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self' ws: http://localhost:*" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Arroxy</title>
    <style>
      :root {
        --boot-splash-bg: #050813;
        --boot-splash-ink: #f1f1f9;
        --boot-splash-muted: #9aa3c4;
        --boot-splash-bar-track: rgba(255, 255, 255, 0.09);
        --boot-splash-brand: #1f69ff;
        --boot-splash-glow: rgba(31, 105, 255, 0.4);
        color-scheme: dark;
        background: var(--boot-splash-bg);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --boot-splash-bg: #f1f3f9;
          --boot-splash-ink: #141429;
          --boot-splash-muted: #5b5b7b;
          --boot-splash-bar-track: rgba(120, 134, 164, 0.24);
          --boot-splash-brand: #1f69ff;
          --boot-splash-glow: rgba(31, 105, 255, 0.32);
          color-scheme: light;
        }
      }

      html[data-boot-splash-theme='dark'] {
        --boot-splash-bg: #050813;
        --boot-splash-ink: #f1f1f9;
        --boot-splash-muted: #9aa3c4;
        --boot-splash-bar-track: rgba(255, 255, 255, 0.09);
        --boot-splash-brand: #1f69ff;
        --boot-splash-glow: rgba(31, 105, 255, 0.4);
        color-scheme: dark;
      }

      html[data-boot-splash-theme='light'] {
        --boot-splash-bg: #f1f3f9;
        --boot-splash-ink: #141429;
        --boot-splash-muted: #5b5b7b;
        --boot-splash-bar-track: rgba(120, 134, 164, 0.24);
        --boot-splash-brand: #1f69ff;
        --boot-splash-glow: rgba(31, 105, 255, 0.32);
        color-scheme: light;
      }

      html,
      body {
        width: 100%;
        min-width: 100%;
        height: 100%;
        min-height: 100%;
        margin: 0;
        background: var(--boot-splash-bg);
      }

      #root {
        min-height: 100vh;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        overflow: hidden;
        background: var(--boot-splash-bg);
        color: var(--boot-splash-ink);
        font-family: Poppins, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      html[data-app-mode='browser-mock'] #boot-splash {
        display: none;
      }

      html[data-app-mode='browser-mock'][data-boot-splash-preview='true'] #boot-splash {
        display: flex;
      }

      .boot-splash__mascot {
        width: 132px;
        height: 132px;
        object-fit: contain;
      }

      .boot-splash__text {
        display: flex;
        width: min(300px, 100%);
        flex-direction: column;
        align-items: center;
        gap: 4px;
        text-align: center;
      }

      .boot-splash__brand {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .boot-splash__status {
        margin: 0;
        color: var(--boot-splash-muted);
        font-size: 12px;
        font-weight: 500;
        line-height: 1.45;
      }

      .boot-splash__bar {
        position: relative;
        width: 176px;
        height: 3px;
        margin-top: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--boot-splash-bar-track);
      }

      .boot-splash__bar::before {
        content: "";
        position: absolute;
        inset: 0;
        width: 52%;
        border-radius: inherit;
        background: var(--boot-splash-brand);
        box-shadow: 0 0 12px var(--boot-splash-glow);
        animation: boot-splash-progress 1.05s ease-in-out infinite;
      }

      @keyframes boot-splash-progress {
        0% {
          transform: translateX(-105%);
        }
        100% {
          transform: translateX(205%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-splash__bar::before {
          animation: none;
          transform: none;
          width: 100%;
          opacity: 0.72;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash" role="status" aria-live="polite" aria-label="Starting Arroxy">
        <img src="/mascot-main.png" alt="" class="boot-splash__mascot" />
        <div class="boot-splash__text">
          <p class="boot-splash__brand">Arroxy</p>
          <p class="boot-splash__status">Starting Arroxy</p>
          <div class="boot-splash__bar" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
