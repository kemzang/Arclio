<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://tally.so; frame-src https://tally.so; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self' ws: http://localhost:*" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Arroxy</title>
    <style>
      :root {
        color-scheme: dark;
        background: #050813;
      }

      html,
      body {
        width: 100%;
        min-width: 100%;
        height: 100%;
        min-height: 100%;
        margin: 0;
        background: #050813;
      }

      #root {
        min-height: 100vh;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
        background: #050813;
        color: #f1f1f9;
        font-family: Poppins, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      .boot-splash__content {
        display: flex;
        width: min(280px, 100%);
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
      }

      .boot-splash__brand {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .boot-splash__status {
        margin: 0;
        color: #9aa3c4;
        font-size: 12px;
        font-weight: 500;
        line-height: 1.45;
      }

      .boot-splash__bar {
        position: relative;
        width: 176px;
        height: 3px;
        margin-top: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.09);
      }

      .boot-splash__bar::before {
        content: "";
        position: absolute;
        inset: 0;
        width: 52%;
        border-radius: inherit;
        background: #1f69ff;
        box-shadow: 0 0 12px rgba(31, 105, 255, 0.4);
        animation: boot-splash-progress 1.05s ease-in-out infinite;
      }

      @keyframes boot-splash-progress {
        0% {
          transform: translateX(-105%);
        }
        100% {
          transform: translateX(205%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-splash__bar::before {
          animation: none;
          transform: none;
          width: 100%;
          opacity: 0.72;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash" role="status" aria-live="polite" aria-label="Arroxy is warming up">
        <div class="boot-splash__content">
          <p class="boot-splash__brand">Arroxy</p>
          <p class="boot-splash__status">Arroxy is warming up</p>
          <div class="boot-splash__bar" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
