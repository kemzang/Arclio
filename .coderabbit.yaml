  path_instructions:
    - path: .github/workflows/**
      instructions: >-
        Review GitHub Actions for least-privilege permissions, unsafe secret exposure, untrusted PR
        execution, shell quoting, release/tag correctness, artifact handling, and whether commands
        can fail silently.
    - path: scripts/**
      instructions: >-
        Review shell and Node/Bun scripts for unsafe command construction, unquoted variables, path
        traversal, platform-specific assumptions, missing error handling, and release/build
        reproducibility.
    - path: src/main/**
      instructions: >-
        This is Electron main-process code. Prioritize security, IPC boundaries, filesystem access,
        updater/download behavior, child process usage, path handling, and validation of
        renderer-provided input.
    - path: src/preload/**
      instructions: >-
        This is Electron preload code. Ensure contextBridge exposes the minimum safe API, does not
        leak Node/Electron primitives, validates IPC inputs, and keeps renderer access constrained.
    - path: src/renderer/**
      instructions: >-
        Review React/UI code for state correctness, accessibility, i18n regressions, unsafe DOM
        usage, IPC misuse, race conditions, and user-facing error handling. Avoid style-only
        nitpicks unless they affect maintainability.
    - path: tests/**
      instructions: >-
        Prioritize meaningful coverage, determinism, and whether tests validate behavior. Do not
        nitpick formatting or implementation style unless it makes the test unreliable.
  slop_detection:
    label: needs-human-review
